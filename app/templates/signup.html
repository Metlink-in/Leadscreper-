<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Lead Intel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: dark; font-family: "Inter", sans-serif; background: #0a0a0a; color: #ffffff; }
    body { margin: 0; display: grid; place-items: center; min-height: 100vh; background: radial-gradient(circle at top right, #00ff8815, transparent), #0a0a0a; }
    .auth-card { background: #111; border: 1px solid #222; border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .logo { width: 48px; height: 48px; background: linear-gradient(135deg, #00ff88, #0a0a0a); border-radius: 12px; display: grid; place-items: center; color: #0a0a0a; font-family: "IBM Plex Mono", monospace; font-weight: 700; margin-bottom: 24px; font-size: 1.2rem; }
    h1 { font-family: "IBM Plex Mono", monospace; margin: 0 0 8px; font-size: 1.5rem; }
    p { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
    .field { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #bbb; font-size: 0.85rem; }
    input { width: 100%; background: #080808; border: 1px solid #222; padding: 12px 16px; border-radius: 12px; color: white; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #00ff88; }
    .button { width: 100%; background: #00ff88; color: #0a0a0a; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: transform 0.2s; margin-top: 8px; }
    .button:hover { transform: translateY(-1px); }
    .footer { margin-top: 24px; text-align: center; color: #888; font-size: 0.9rem; }
    .footer a { color: #00ff88; text-decoration: none; }
    .error-msg { background: #ff444422; color: #ff4444; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">LI</div>
    <h1>Create Account</h1>
    <p>Join Lead Intel and start generating leads</p>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <form id="signupForm">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" required placeholder="John Doe">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="name@company.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="button">Create Account</button>
    </form>
    
    <div class="footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      try {
        const res = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ name, email, password })
        });
        
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          errorMsg.textContent = data.detail || 'Sign up failed';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
