<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Intel - History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      --primary: #00ff88;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 80% 20%, #00ff8808, transparent), 
                  radial-gradient(circle at 20% 80%, #00ff8805, transparent), 
                  #0a0a0a;
      background-attachment: fixed;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 24px 32px 20px;
      border-bottom: 1px solid #111;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #00cc6e);
      display: grid;
      place-items: center;
      color: #0a0a0a;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 700;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      font-family: "IBM Plex Mono", monospace;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #888888;
      font-size: 0.95rem;
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 32px;
    }

    .panel {
      background: rgba(17, 17, 17, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 32px;
      display: grid;
      gap: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h2 {
      margin: 0;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 700;
      color: var(--primary);
      font-size: 1.5rem;
    }

    .history-list {
      display: grid;
      gap: 16px;
    }

    .history-card {
      background: rgba(15, 15, 15, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }

    .history-card:hover {
      border-color: rgba(0, 255, 136, 0.3);
      background: rgba(0, 255, 136, 0.02);
      transform: translateY(-2px);
    }

    .card-main {
      display: grid;
      gap: 8px;
    }

    .card-title {
      font-weight: 700;
      font-size: 1.2rem;
      color: #fff;
    }

    .card-meta {
      color: #888888;
      font-size: 0.9rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta-tag {
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      color: #ccc;
      font-weight: 500;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #0a0a0a;
      font-weight: 700;
      cursor: pointer;
      padding: 10px 20px;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
    }

    .button.outline {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-weight: 500;
    }
    
    .button.outline:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      color: var(--primary);
    }

    @media (max-width: 800px) {
      .history-card { flex-direction: column; align-items: flex-start; gap: 20px; }
      .history-card div:last-child { width: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    }
    
    @media (max-width: 480px) {
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .layout { padding: 20px; }
      .history-card div:last-child { grid-template-columns: 1fr; }
    }
  </style>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300ffa3'/><text x='50%' y='65%' font-family='Arial, sans-serif' font-size='50' font-weight='bold' fill='%23000' text-anchor='middle'>LI</text></svg>" type="image/svg+xml">
</head>

<body>
  <header>
    <div class="brand">
      <div class="logo">LI</div>
      <div>
        <h1>Lead Intel</h1>
        <div class="header-meta">
          <a href="/">Dashboard</a> | 
          <a href="/admin">Settings</a> | 
          <a href="/logout" style="color: #ff4444; margin-left: 8px;">Logout</a>
        </div>
      </div>
    </div>
    <div style="text-align: right;">
      <div style="font-weight: 600; color: #00ff88; margin-bottom: 4px;">{{ user.name }}</div>
    </div>
  </header>
  <main class="layout">
    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;">
        <h2>Recent Searches</h2>
        <button class="button outline" style="color: #ff5555; border-color: #442222;" onclick="clearAllHistory()">Clear All History</button>
      </div>
      <div class="history-list" id="historyList">
        <p style="color: #888">Loading history...</p>
      </div>
    </div>
  </main>
  
  <script>
    function formatDate(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString();
    }

    async function loadHistory() {
      const list = document.getElementById('historyList');
      try {
        const res = await fetch('/api/history?limit=50');
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        
        if (!data.history || data.history.length === 0) {
          list.innerHTML = '<p style="color: #888">No search history found.</p>';
          return;
        }

        list.innerHTML = '';
        data.history.forEach(item => {
          const card = document.createElement('div');
          card.className = 'history-card';
          
          let industries = item.meta?.industries?.join(', ') || 'Any Industry';
          let location = [];
          if (item.meta?.city) location.push(item.meta.city);
          if (item.meta?.country) location.push(item.meta.country);
          let locationStr = location.join(', ') || 'Global';
          
          card.innerHTML = `
            <div class="card-main">
              <div class="card-title">${industries} in ${locationStr}</div>
              <div class="card-meta">
                <span>${formatDate(item.created_at)}</span>
                <span class="meta-tag">Max Results: ${item.meta?.max_results || 20}</span>
                <span class="meta-tag">AI Enabled: ${item.meta?.enable_ai ? 'Yes' : 'No'}</span>
              </div>
              <div style="font-size: 0.85rem; color: #666; margin-top: 4px;">Search ID: ${item.search_id}</div>
            </div>
            <div style="display: flex; gap: 8px;">
              <a href="/?search_id=${item.search_id}" class="button">View Results</a>
              <button class="button outline" onclick="exportSearch('${item.search_id}', 'csv')">CSV</button>
              <button class="button outline" onclick="exportSearch('${item.search_id}', 'json')">JSON</button>
              <button class="button outline" onclick="exportSearch('${item.search_id}', 'pdf')">PDF</button>
              <button class="button outline" style="color: #ff5555;" onclick="deleteSearch('${item.search_id}')">Delete</button>
            </div>
          `;
          list.appendChild(card);
        });
      } catch (e) {
        console.error(e);
        list.innerHTML = '<p style="color: #ff5555">Error loading history.</p>';
      }
    }

    function exportSearch(searchId, format) {
      window.location.href = `/api/export/${format}?search_id=${searchId}`;
    }

    async function deleteSearch(searchId) {
      if (!confirm('Are you sure you want to delete this search?')) return;
      try {
        const res = await fetch(`/api/history/${searchId}`, { method: 'DELETE' });
        if (res.ok) {
          loadHistory();
        } else {
          alert('Failed to delete search');
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function clearAllHistory() {
      if (!confirm('Are you sure you want to CLEAR ALL history? This cannot be undone.')) return;
      try {
        const res = await fetch('/api/history', { method: 'DELETE' });
        if (res.ok) {
          loadHistory();
        } else {
          alert('Failed to clear history');
        }
      } catch (e) {
        console.error(e);
      }
    }

    loadHistory();
    function logout() {
      document.cookie = "access_token=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;";
      window.location.href = "/logout";
    }
  </script>
</body>
</html>
