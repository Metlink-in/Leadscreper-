<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Lead Intel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { color-scheme: dark; }

    body {
      font-family: "Inter", sans-serif;
      background: #050505;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(circle at 30% 10%, rgba(0,255,136,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 70% 90%, rgba(0,255,136,0.04) 0%, transparent 50%);
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #666;
      text-decoration: none;
      font-size: 0.875rem;
      margin-bottom: 32px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #00ff88; }

    .auth-card {
      background: rgba(17, 17, 17, 0.8);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #00ff88, #00cc6e);
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #050505;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
      flex-shrink: 0;
    }
    .brand-name {
      font-family: "IBM Plex Mono", monospace;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .auth-heading {
      font-family: "IBM Plex Mono", monospace;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .auth-sub {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .error-msg {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.3);
      color: #ff6b6b;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 0.875rem;
      display: none;
    }

    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    /* Plain input (no eye btn) */
    .field > input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #fff;
      padding: 14px 16px;
      font-size: 0.95rem;
      font-family: "Inter", sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .field > input:focus {
      border-color: rgba(0,255,136,0.5);
      background: rgba(0,255,136,0.03);
    }
    .field > input::placeholder { color: #444; }

    /* Input with eye button */
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #fff;
      padding: 14px 48px 14px 16px;
      font-size: 0.95rem;
      font-family: "Inter", sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-wrap input:focus {
      border-color: rgba(0,255,136,0.5);
      background: rgba(0,255,136,0.03);
    }
    .input-wrap input::placeholder { color: #444; }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }
    .toggle-password:hover { color: #00ff88; }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #00ff88, #00cc6e);
      color: #050505;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0,255,136,0.2);
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,255,136,0.3);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin: 24px 0;
    }

    .auth-footer {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
    }
    .auth-footer a {
      color: #00ff88;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .auth-footer a:hover { opacity: 0.8; }

    .terms {
      text-align: center;
      color: #444;
      font-size: 0.78rem;
      margin-top: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <a href="/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to home
    </a>

    <div class="auth-card">
      <div class="brand">
        <div class="logo">LI</div>
        <span class="brand-name">Lead Intel</span>
      </div>

      <h1 class="auth-heading">Create account</h1>
      <p class="auth-sub">Start generating AI-powered leads today</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="signupForm">
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="John Doe" autocomplete="name">
        </div>
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="name@company.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" required placeholder="Min. 8 characters" autocomplete="new-password">
            <button type="button" class="toggle-password" onclick="toggleVisibility('password', this)" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
      </form>

      <p class="terms">By creating an account you agree to our terms of service.</p>

      <hr class="divider">
      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    function toggleVisibility(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
      } else {
        input.type = 'password';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      }
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      submitBtn.textContent = 'Creating account...';
      submitBtn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ name, email, password })
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          errorMsg.textContent = data.detail || 'Sign up failed. Please try again.';
          errorMsg.style.display = 'block';
          submitBtn.textContent = 'Create Account';
          submitBtn.disabled = false;
        }
      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
        submitBtn.textContent = 'Create Account';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
