<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Lead Intel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 80% 20%, #00ff8808, transparent),
        radial-gradient(circle at 20% 80%, #00ff8805, transparent),
        #0a0a0a;
      background-attachment: fixed;
    }

    a {
      color: #00ff88;
      text-decoration: none;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 24px 32px 20px;
      border-bottom: 1px solid #111111;
      background: #0a0a0a;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #00ff88, #0a0a0a);
      display: grid;
      place-items: center;
      color: #0a0a0a;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 700;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      font-family: "IBM Plex Mono", monospace;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #888888;
      font-size: 0.95rem;
    }

    .layout {
      padding: 24px 32px 40px;
      max-width: 600px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(17, 17, 17, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .panel h2 {
      margin: 0 0 18px;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 700;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 0.9rem;
      color: #bbbbbb;
    }

    .field input,
    .field select {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 14px;
      color: #ffffff;
      padding: 14px 16px;
      font-size: 0.95rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #00ff88, #00cc6e);
      color: #0a0a0a;
      font-weight: 700;
      cursor: pointer;
      padding: 14px 28px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 255, 136, 0.3);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #00ff88;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .toggle-password:hover {
      color: #00ff88;
    }
  </style>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300ffa3'/><text x='50%' y='65%' font-family='Arial, sans-serif' font-size='50' font-weight='bold' fill='%23000' text-anchor='middle'>LI</text></svg>"
    type="image/svg+xml">
</head>

<body>
  <header>
    <div class="brand">
      <div class="logo">LI</div>
      <div>
        <h1>Lead Intel</h1>
        <div class="header-meta">
          <a href="/">Dashboard</a> |
          <a href="/history">History</a> |
          <a href="/logout" style="color: #ff4444; margin-left: 8px;">Logout</a>
        </div>
      </div>
    </div>
    <div style="text-align: right;">
      <div style="font-weight: 600; color: #00ff88; margin-bottom: 4px;">{{ user.name }}</div>
    </div>
  </header>

  {% if message %}
  <div
    style="max-width: 600px; margin: 20px auto 0; padding: 12px 20px; background: #00ff8822; border: 1px solid #00ff88; border-radius: 12px; color: #00ff88; text-align: center;">
    {{ message }}
  </div>
  {% endif %}

  <div class="layout">
    <a href="/" class="back-link">&larr; Back to Dashboard</a>

    <div class="panel" style="margin-bottom: 24px; border-color: rgba(0, 255, 136, 0.2);">
      <h2 style="color: #00ff88; font-size: 1.1rem; margin-bottom: 24px;">SearchApi.io Usage</h2>
      <div id="creditInfo" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
        <div class="stat-card"
          style="background: rgba(0, 255, 136, 0.05); padding: 20px; border-radius: 16px; border: 1px solid rgba(0, 255, 136, 0.1);">
          <div
            style="color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">
            Remaining Credits</div>
          <div id="remainingCredits"
            style="font-size: 2rem; font-weight: 700; color: #00ff88; font-family: 'IBM Plex Mono', monospace;">
            Loading...</div>
        </div>
        <div class="stat-card"
          style="background: rgba(255, 255, 255, 0.02); padding: 20px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05);">
          <div
            style="color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">
            Plan Type</div>
          <div id="planType"
            style="font-size: 2rem; font-weight: 700; color: #ffffff; font-family: 'IBM Plex Mono', monospace;">
            Loading...</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Credentials Configuration</h2>
      <form method="post" action="/admin/update">
        <input type="hidden" name="search_api_provider" value="searchapi">
        <div class="field">
          <label for="search_api_key">SearchApi.io API Key</label>
          <div class="password-wrapper">
            <input type="password" id="search_api_key" name="search_api_key"
              value="{{ user.search_api_key if user.search_api_key else '' }}"
              placeholder="Enter your SearchApi.io key">
            <button type="button" class="toggle-password" onclick="toggleVisibility('search_api_key', this)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="gemini_api_key">Gemini API Key</label>
          <div class="password-wrapper">
            <input type="password" id="gemini_api_key" name="gemini_api_key"
              value="{{ user.gemini_api_key if user.gemini_api_key else '' }}" placeholder="Enter your Gemini key">
            <button type="button" class="toggle-password" onclick="toggleVisibility('gemini_api_key', this)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="openai_api_key">OpenAI API Key (optional)</label>
          <div class="password-wrapper">
            <input type="password" id="openai_api_key" name="openai_api_key"
              value="{{ user.openai_api_key if user.openai_api_key else '' }}">
            <button type="button" class="toggle-password" onclick="toggleVisibility('openai_api_key', this)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="button">Save Credentials</button>
      </form>
    </div>
  </div>

  <script>
    function toggleVisibility(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
      } else {
        input.type = 'password';
        btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      }
    }

    async function loadCredits() {
      try {
        const res = await fetch('/api/credits');
        const data = await res.json();
        if (data.error) {
          document.getElementById('remainingCredits').innerText = 'Error';
          document.getElementById('planType').innerText = 'Check Key';
        } else {
          document.getElementById('remainingCredits').innerText = data.remaining_searches || '0';
          document.getElementById('planType').innerText = data.plan_name || 'Free';
        }
      } catch (e) {
        console.error(e);
      }
    }
    loadCredits();

    function logout() {
      document.cookie = "access_token=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;";
      window.location.href = "/logout";
    }
  </script>
</body>

</html>
