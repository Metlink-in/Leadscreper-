<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Intel - History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      font-family: "Inter", sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0a0a;
    }

    a {
      color: #00ff88;
      text-decoration: none;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 24px 32px 20px;
      border-bottom: 1px solid #111111;
      background: #0a0a0a;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #00ff88, #0a0a0a);
      display: grid;
      place-items: center;
      color: #0a0a0a;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 700;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      font-family: "IBM Plex Mono", monospace;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #888888;
      font-size: 0.95rem;
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 32px;
    }

    .panel {
      background: #111111;
      border: 1px solid #1a1a1a;
      border-radius: 24px;
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    h2 {
      margin: 0;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 700;
      color: #00ff88;
    }

    .history-list {
      display: grid;
      gap: 16px;
    }

    .history-card {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .history-card:hover {
      border-color: #333333;
      transform: translateY(-2px);
    }

    .card-main {
      display: grid;
      gap: 8px;
    }

    .card-title {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .card-meta {
      color: #888888;
      font-size: 0.9rem;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .meta-tag {
      background: #1a1a1a;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #cccccc;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      border-radius: 12px;
      background: #00ff88;
      color: #0a0a0a;
      font-weight: 600;
      cursor: pointer;
      padding: 10px 16px;
      transition: opacity 0.2s ease;
    }

    .button:hover {
      opacity: 0.9;
    }

    .button.outline {
      background: transparent;
      border: 1px solid #333333;
      color: #ffffff;
    }
    
    .button.outline:hover {
      border-color: #00ff88;
      color: #00ff88;
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <div class="logo">LI</div>
      <div>
        <h1>Lead Intel</h1>
        <div class="header-meta">
          <a href="/">Dashboard</a> | 
          <a href="/admin">Settings</a> | 
          <a href="/logout" onclick="logout(); return false;" style="color: #ff4444; margin-left: 8px;">Logout</a>
        </div>
      </div>
    </div>
    <div style="text-align: right;">
      <div style="font-weight: 600; color: #00ff88; margin-bottom: 4px;">{{ user.name }}</div>
    </div>
  </header>
  <main class="layout">
    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;">
        <h2>Recent Searches</h2>
        <button class="button outline" style="color: #ff5555; border-color: #442222;" onclick="clearAllHistory()">Clear All History</button>
      </div>
      <div class="history-list" id="historyList">
        <p style="color: #888">Loading history...</p>
      </div>
    </div>
  </main>
  
  <script>
    function formatDate(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString();
    }

    async function loadHistory() {
      const list = document.getElementById('historyList');
      try {
        const res = await fetch('/api/history?limit=50');
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        
        if (!data.history || data.history.length === 0) {
          list.innerHTML = '<p style="color: #888">No search history found.</p>';
          return;
        }

        list.innerHTML = '';
        data.history.forEach(item => {
          const card = document.createElement('div');
          card.className = 'history-card';
          
          let industries = item.meta?.industries?.join(', ') || 'Any Industry';
          let location = [];
          if (item.meta?.city) location.push(item.meta.city);
          if (item.meta?.country) location.push(item.meta.country);
          let locationStr = location.join(', ') || 'Global';
          
          card.innerHTML = `
            <div class="card-main">
              <div class="card-title">${industries} in ${locationStr}</div>
              <div class="card-meta">
                <span>${formatDate(item.created_at)}</span>
                <span class="meta-tag">Max Results: ${item.meta?.max_results || 20}</span>
                <span class="meta-tag">AI Enabled: ${item.meta?.enable_ai ? 'Yes' : 'No'}</span>
              </div>
              <div style="font-size: 0.85rem; color: #666; margin-top: 4px;">Search ID: ${item.search_id}</div>
            </div>
            <div style="display: flex; gap: 8px;">
              <a href="/?search_id=${item.search_id}" class="button">View Results</a>
              <button class="button outline" onclick="exportSearch('${item.search_id}', 'csv')">CSV</button>
              <button class="button outline" onclick="exportSearch('${item.search_id}', 'json')">JSON</button>
              <button class="button outline" onclick="exportSearch('${item.search_id}', 'pdf')">PDF</button>
              <button class="button outline" style="color: #ff5555;" onclick="deleteSearch('${item.search_id}')">Delete</button>
            </div>
          `;
          list.appendChild(card);
        });
      } catch (e) {
        console.error(e);
        list.innerHTML = '<p style="color: #ff5555">Error loading history.</p>';
      }
    }

    function exportSearch(searchId, format) {
      window.location.href = `/api/export/${format}?search_id=${searchId}`;
    }

    async function deleteSearch(searchId) {
      if (!confirm('Are you sure you want to delete this search?')) return;
      try {
        const res = await fetch(`/api/history/${searchId}`, { method: 'DELETE' });
        if (res.ok) {
          loadHistory();
        } else {
          alert('Failed to delete search');
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function clearAllHistory() {
      if (!confirm('Are you sure you want to CLEAR ALL history? This cannot be undone.')) return;
      try {
        const res = await fetch('/api/history', { method: 'DELETE' });
        if (res.ok) {
          loadHistory();
        } else {
          alert('Failed to clear history');
        }
      } catch (e) {
        console.error(e);
      }
    }

    loadHistory();
    function logout() {
      document.cookie = "access_token=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;";
      window.location.href = "/logout";
    }
  </script>
</body>
</html>
